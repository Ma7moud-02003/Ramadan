<section class="min-h-screen flex items-center justify-center font-['Cairo'] bg-[#020408] relative overflow-hidden" animate.enter="animate-enter">
  
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-900/10 via-transparent to-transparent pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-2xl px-6" animate.enter="ayahSection">
    
    <div class="bg-[#080c16]/60 backdrop-blur-xl border border-emerald-900/20 rounded-[3rem] p-8 md:p-16 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.8)] text-center relative overflow-hidden">
      
      <div class="flex justify-center mb-10 opacity-40">
        <div class="h-px w-12 bg-gradient-to-r from-transparent to-amber-500"></div>
        <i class="fa-solid fa-star-and-crescent mx-4 text-amber-500 text-xs"></i>
        <div class="h-px w-12 bg-gradient-to-l from-transparent to-amber-500"></div>
      </div>

      @if(ayah().data) {
        <p class="text-emerald-500/60 font-['Amiri'] text-xl mb-6 tracking-wide">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>

        <h1 class="text-4xl md:text-6xl font-['Amiri'] leading-[4.5rem] md:leading-[5.5rem] text-stone-100 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] mb-8" style="direction: rtl;">
          {{ayah().data.text}}
        </h1>

        <p class="text-emerald-500/40 font-['Amiri'] text-lg mb-10 italic">صَدَقَ اللهُ الْعَظِيمُ</p>

        <div class="inline-flex items-center gap-3 px-5 py-2 rounded-full bg-emerald-950/30 border border-emerald-900/30 text-stone-400 text-sm mb-12">
          <i class="fa-solid fa-book-open text-xs text-amber-600/50"></i>
          <span>{{ayah().data.surah.name}}</span>
          <span class="w-1 h-1 bg-emerald-900 rounded-full"></span>
          <span>آية رقم: {{ayah().data.number}}</span>
        </div>
      }

      <div class="flex justify-center">
        <button (click)="routTo()"
                class="group relative overflow-hidden bg-emerald-600 hover:bg-emerald-500 text-white px-12 py-4 rounded-2xl font-bold transition-all duration-300 hover:scale-105 active:scale-95 shadow-[0_10px_20px_rgba(5,150,105,0.2)]">
          <span class="relative z-10 flex items-center gap-3">
             تَمَّتِ الْقِرَاءَةُ
            <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
          </span>
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
        </button>
      </div>

    </div>

    <p class="text-center mt-8 text-stone-500 text-xs font-medium tracking-widest uppercase">
      انقر على الزر أعلاه للانتقال إلى وِرد الحفظ اليومي
    </p>
  </div>

</section>
